services:
  bot:
    build: .
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      CONFIG_PATH: config.example.yml
      STATE_DRIVER: file
      STATE_FILE: data/seen-items.json
    volumes:
      - bot-data:/app/data

  redis:
    image: redis:7-alpine
    profiles:
      - redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  bot-data:
  redis-data: